name: Build Incus runtime images

on:
  push:
    branches: ["main"]
    tags: ["incus-v*"]
  workflow_dispatch:

concurrency:
  group: build-incus-runtime-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build-${{ matrix.variant }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: kubelet
            file: docker/kubelet/Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - variant: kubelet
            file: docker/kubelet/Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - variant: quadlet
            file: docker/quadlet/Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - variant: quadlet
            file: docker/quadlet/Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and validate runtime tools
        run: |
          docker buildx build --load \
            --platform ${{ matrix.platform }} \
            --tag incus-${{ matrix.variant }}-test:${{ matrix.arch }} \
            --file ${{ matrix.file }} .
          if [ "${{ matrix.variant }}" = kubelet ]; then
            docker run --rm --entrypoint sh incus-kubelet-test:${{ matrix.arch }} -ec '
              test "$(incus --version)" = "7.2"
              ! command -v incusd
              ! command -v criu
              ! command -v rbd
              ! command -v lxcfs
              test ! -e /usr/local/sbin/start.sh
              test ! -e /usr/local/sbin/healthcheck.sh
            '
          else
            docker run --rm --entrypoint sh incus-quadlet-test:${{ matrix.arch }} -ec '
              test "$(incusd --version)" = "7.2"
              test "$(incus --version)" = "7.2"
              criu --version
              command -v rbd
              command -v lvm
              command -v udevadm
              command -v zfs
              command -v zpool
              command -v iptables-restore
              command -v ip6tables-restore
              command -v iptables-legacy-restore
              command -v ip6tables-legacy-restore
              command -v lxcfs
              test -x /usr/local/sbin/start.sh
              test -x /usr/local/sbin/healthcheck.sh
              tar --help 2>&1 | grep -q -- "--no-unquote"
              ! ldd /usr/sbin/incusd | grep -q "not found"
              ! ldd /usr/local/sbin/criu | grep -q "not found"
              ! ldd /usr/lib/liblxc.so.1.9.0 | grep -q "not found"
              strings /usr/lib/liblxc.so.1.9.0 | grep -q "apparmor"
            '
          fi

      - name: Build and push image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.github.fivetime.incus.variant=${{ matrix.variant }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: publish-${{ matrix.variant }} manifest
    needs: build
    strategy:
      matrix:
        variant: [kubelet, quadlet]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-platform manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ matrix.variant }}" \
            --tag "${IMAGE}:${{ matrix.variant }}-${short_sha}" \
            "${IMAGE}:${{ matrix.variant }}-amd64" \
            "${IMAGE}:${{ matrix.variant }}-arm64"
          docker buildx imagetools inspect "${IMAGE}:${{ matrix.variant }}"
