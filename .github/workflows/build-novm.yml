name: Build novm image

on:
  push:
    branches: [ "main" ]
    tags: [ 'novm-v*' ]
  workflow_dispatch:

concurrency:
  group: build-novm-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-alpine-novm:
    name: build-alpine-novm (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Alpine no-VM runtime tools
        run: |
          docker buildx build \
            --load \
            --platform ${{ matrix.platform }} \
            --tag incus-alpine-novm-test:${{ matrix.arch }} \
            --file docker/alpine-novm/Dockerfile \
            .
          docker run --rm --entrypoint sh incus-alpine-novm-test:${{ matrix.arch }} -ec '
            test "$(incusd --version)" = "7.2"
            test "$(incus --version)" = "7.2"
            criu --version
            command -v rbd
            command -v iptables-restore
            command -v ip6tables-restore
            command -v iptables-legacy-restore
            command -v ip6tables-legacy-restore
            tar --help 2>&1 | grep -q -- "--no-unquote"
            ! ldd /usr/sbin/incusd | grep -q "not found"
            ! ldd /usr/local/sbin/criu | grep -q "not found"
            ! ldd /usr/lib/liblxc.so.1.9.0 | grep -q "not found"
            strings /usr/lib/liblxc.so.1.9.0 | grep -q "apparmor"
          '

      - name: Build and push Alpine no-VM image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          file: docker/alpine-novm/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:alpine-novm-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.github.fivetime.incus.variant=alpine-novm
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-alpine-novm:
    name: publish-alpine-novm manifest
    needs: build-alpine-novm
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-platform manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            --tag "${IMAGE}:alpine-novm" \
            --tag "${IMAGE}:alpine-novm-${short_sha}" \
            "${IMAGE}:alpine-novm-amd64" \
            "${IMAGE}:alpine-novm-arm64"
          docker buildx imagetools inspect "${IMAGE}:alpine-novm"
